name: Generate LinkedIn Post

on:
  schedule:
    - cron: '30 1 * * *'  # 7:00 AM IST (1:30 AM UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Random delay (0-30 min)
        run: sleep $((RANDOM % 1800))

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Generate and publish LinkedIn post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
        run: python src/generator.py

      - name: Commit and push generated post
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "bot@visualcraft-ops.github.io"
          git add content/
          git diff --staged --quiet || git commit -m "📝 Auto-generated LinkedIn post for $(date +%Y-%m-%d)"
          git push
