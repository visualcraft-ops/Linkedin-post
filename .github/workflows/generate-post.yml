name: Generate LinkedIn Post

on:
  schedule:
    # Runs daily at 7:00 AM IST (1:30 AM UTC)
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      topic_override:
        description: 'Override topic (Visual Merchandising, HR & Recruitment, etc.)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai==0.8.3

      - name: Generate LinkedIn post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/generator.py

      - name: Commit and push generated post
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "bot@visualcraft-ops.github.io"
          git add content/ 
          git diff --staged --quiet || git commit -m "📝 Auto-generated LinkedIn post for $(date +%Y-%m-%d)"
          git push
