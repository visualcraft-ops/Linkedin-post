name: Evening LinkedIn Post

on:
  schedule:
    # Runs daily at 6:00 PM IST (12:30 PM UTC)
    - cron: '30 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evening-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai==0.8.3 requests>=2.31.0

      - name: Generate and publish evening post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          POST_SESSION: evening
        run: python src/generator.py

      - name: Commit generated post
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "bot@visualcraft-ops.github.io"
          git add content/
          git diff --staged --quiet || git commit -m "🌙 Evening LinkedIn post for $(date +%Y-%m-%d)"
          git push
